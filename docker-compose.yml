version: '3.8'

services:
  divulguei-postgres:
    image: postgres:16-alpine
    container_name: divulguei-postgres
    environment:
      POSTGRES_DB: divulguei
      POSTGRES_USER: divulguei
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - divulguei-pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U divulguei"]
      interval: 10s
      timeout: 5s
      retries: 5

  divulguei-redis:
    image: redis:7-alpine
    container_name: divulguei-redis
    expose:
      - "6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  divulguei-api:
    build: ./packages/api
    container_name: divulguei-api
    environment:
      DATABASE_URL: postgresql://divulguei:${DB_PASSWORD}@divulguei-postgres:5432/divulguei
      REDIS_URL: redis://divulguei-redis:6379
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      NODE_ENV: production
      PORT: 3001
    ports:
      - "127.0.0.1:3011:3001"
    volumes:
      - divulguei-uploads:/app/uploads
    depends_on:
      divulguei-postgres:
        condition: service_healthy
      divulguei-redis:
        condition: service_healthy
    restart: unless-stopped

  divulguei-web:
    build: ./packages/web
    container_name: divulguei-web
    ports:
      - "127.0.0.1:3012:3000"
    depends_on:
      - divulguei-api
    restart: unless-stopped

  divulguei-bot:
    build: ./packages/bot
    container_name: divulguei-bot
    environment:
      DB_HOST: divulguei-postgres
      DB_PORT: 5432
      DB_NAME: divulguei
      DB_USER: divulguei
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: divulguei-redis
      REDIS_PORT: 6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      BOT_PHONE_NUMBER: ${BOT_PHONE_NUMBER}
      ADMIN_PHONE: ${ADMIN_PHONE}
      DEFAULT_CITY_ID: ${DEFAULT_CITY_ID}
      BOT_AUTH_DIR: /app/auth
      NODE_ENV: production
    volumes:
      - divulguei-bot-auth:/app/auth
    depends_on:
      divulguei-postgres:
        condition: service_healthy
      divulguei-redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  divulguei-pgdata:
  divulguei-bot-auth:
  divulguei-uploads:

networks:
  default:
    name: divulguei-network
